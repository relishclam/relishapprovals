  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('Service Worker registered:', registration.scope);
            
            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New service worker available
                  if (confirm('New version available! Reload to update?')) {
                    window.location.reload();
                  }
                }
              });
            });
          })
          .catch(error => console.log('Service Worker registration failed:', error));
      });
    }
  </script>

  <!-- Error handler for when app fails to load -->
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error('App Error:', msg, url, lineNo);
      var root = document.getElementById('root');
      if (root && !window.__appLoaded) {
        root.innerHTML = '<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 20px; text-align: center;">' +
          '<div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>' +
          '<h2 style="margin: 0 0 10px;">Unable to Load App</h2>' +
          '<p style="color: rgba(255,255,255,0.7); margin-bottom: 20px;">Please try the following:</p>' +
          '<ul style="text-align: left; color: rgba(255,255,255,0.8); line-height: 2;">' +
          '<li>Clear browser cache and reload</li>' +
          '<li>Try using Chrome or Safari</li>' +
          '<li>Check your internet connection</li>' +
          '<li>Try opening in incognito mode</li>' +
          '</ul>' +
          '<button onclick="location.reload(true)" style="margin-top: 20px; padding: 12px 30px; background: #f5841f; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;">🔄 Reload App</button>' +
          '</div>';
      }
      return false;
    };
    
    // Mark app as loaded when React renders
    window.__appLoaded = false;
    setTimeout(function() {
      var loading = document.getElementById('app-loading');
      if (loading && !window.__appLoaded) {
        // App didn't load in 15 seconds - likely a problem
        console.warn('App load timeout');
      }
    }, 15000);
  </script>
  
  <script type="text/babel" data-presets="react" src="/app.js?v=22"></script>
