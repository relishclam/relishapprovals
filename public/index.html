  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('Service Worker registered:', registration.scope);
            
            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New service worker available
                  if (confirm('New version available! Reload to update?')) {
                    window.location.reload();
                  }
                }
              });
            });
          })
          .catch(error => console.log('Service Worker registration failed:', error));
      });
    }
  </script>

  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error("App Error:", msg, url, lineNo);
      var root = document.getElementById("root");
      if (root && window.__appLoaded === false) {
        root.innerHTML = "<div style=display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;text-align:center;padding:20px;font-family:sans-serif><div><div style=font-size:48px;margin-bottom:20px>⚠️</div><h2>Unable to Load App</h2><p style=color:rgba(255,255,255,.7);margin:10px 0 20px>Clear cache, try Chrome, or reload in incognito.</p><button onclick=location.reload(true) style=padding:12px 30px;background:#f5841f;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer>🔄 Reload</button></div></div>";
      }
      return false;
    };
    window.__appLoaded = false;
    setTimeout(function() {
      if (document.getElementById("app-loading") && window.__appLoaded === false)
        console.warn("App load timeout");
    }, 15000);
  </script>

  <script type="text/babel" data-presets="react" src="/app.js?v=23"></script>
